<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anirban Club | অনির্বাণ ক্লাব</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #28a745; --accent: #ffc107; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Arial; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?q=80&w=1023&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; text-align: center; overflow-x: hidden; 
        }
        
        .header { padding: 60px 20px; border-bottom: 3px solid var(--primary); background: rgba(0,0,0,0.4); }
        .header h1 { margin: 0; letter-spacing: 4px; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        .menu-grid { display: flex; justify-content: center; gap: 8px; padding: 20px 10px; flex-wrap: wrap; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .menu-btn { 
            background: transparent; border: 2px solid var(--primary); color: #fff; 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; flex: 1; max-width: 150px; transition: 0.3s; font-size: 13px;
        }
        .menu-btn.active { background: var(--primary); color: #000; }

        .content-section { display: none; padding: 40px 15px; min-height: 500px; }
        .content-section.active { display: block; animation: slideUp 0.4s ease-out; }

        /* ম্যাচ কার্ড */
        .match-card-wrapper { margin-bottom: 25px; }
        .match-card {
            background: linear-gradient(90deg, #ff9800 0%, #ff5722 100%);
            margin: 0 auto; width: 100%; max-width: 550px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border-radius: 10px 10px 0 0;
        }
        .team { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 15px; font-weight: 900; color: #fff; }
        .vs-box { background: #fff; color: #ff5722; font-weight: 900; padding: 5px 12px; border-radius: 5px; }
        .match-meta {
            background: rgba(20, 20, 20, 0.9); padding: 10px; font-size: 13px;
            width: 100%; max-width: 550px; margin: 0 auto; border-radius: 0 0 10px 10px; border-bottom: 3px solid var(--accent);
        }

        /* প্লেয়ার কার্ড */
        .player-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: #000; width: 230px; border: 3px solid var(--primary); border-radius: 15px; overflow: hidden; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { background: var(--primary); color: #000; padding: 10px; text-align: left; position: relative; }
        .card-info h3 { margin: 0; font-size: 18px; font-weight: 900; }
        .card-no { position: absolute; right: 10px; top: 5px; font-size: 1.8rem; font-weight: 900; opacity: 0.2; }

        /* ইনফো বক্স */
        .info-box { max-width: 800px; margin: auto; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); text-align: left; line-height: 1.8; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .gallery-grid img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header"><h1>ANIRBAN CLUB</h1></div>
    <div class="menu-grid">
        <button class="menu-btn active" onclick="showSection('match-sec', this)">MATCHES</button>
        <button class="menu-btn" onclick="showSection('squad-sec', this)">SQUAD</button>
        <button class="menu-btn" onclick="showSection('gallery-sec', this)">GALLERY</button>
        <button class="menu-btn" onclick="showSection('info-sec', this)">ABOUT US </button>
    </div>

    <div id="match-sec" class="content-section active"><div id="match-list"></div></div>
    <div id="squad-sec" class="content-section"><div id="player-list" class="player-grid"></div></div>
    <div id="gallery-sec" class="content-section"><div id="gallery-list" class="gallery-grid"></div></div>
    
    <div id="info-sec" class="content-section">
        <div class="info-box">
            <h2 style="color:var(--primary); margin-top:0;">আমাদের ক্লাব সম্পর্কে</h2>
            <p id="club-desc" style="white-space: pre-wrap;">তথ্য লোড হচ্ছে...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_qcXBjhL5f4LQ7WVeSWHePpEzgEQpHPQ",
            authDomain: "anirban-club-8277f.firebaseapp.com",
            databaseURL: "https://anirban-club-8277f-default-rtdb.firebaseio.com",
            projectId: "anirban-club-8277f",
            storageBucket: "anirban-club-8277f.firebasestorage.app",
            messagingSenderId: "844771629661",
            appId: "1:844771629661:web:84b955dd93724060b4cbb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        db.ref('matchData').on('value', s => {
            const div = document.getElementById('match-list'); div.innerHTML = '';
            s.forEach(c => {
                const m = c.val();
                div.innerHTML += `<div class="match-card-wrapper"><div class="match-card"><div class="team"><img src="logo.jpg"><span>ANIRBAN</span></div><div class="vs-box">VS</div><div class="team"><span>${m.opponent}</span><img src="https://cdn-icons-png.flaticon.com/512/53/53254.png"></div></div><div class="match-meta">${m.date} — ${m.time} — ANIRBAN ARENA</div></div>`;
            });
        });

        db.ref('players').on('value', s => {
            const div = document.getElementById('player-list'); div.innerHTML = '';
            s.forEach(c => {
                const p = c.val();
                div.innerHTML += `<div class="card"><img src="${p.photo}"><div class="card-info"><div class="card-no">#${p.number}</div><h3>${p.name}</h3><small>${p.position}</small></div></div>`;
            });
        });

        db.ref('gallery').on('value', s => {
            const div = document.getElementById('gallery-list'); div.innerHTML = '';
            s.forEach(c => { div.innerHTML += `<img src="${c.val().url}">`; });
        });

        db.ref('clubInfo').on('value', s => {
            document.getElementById('club-desc').innerText = s.val() || "অনির্বাণ ক্লাব সম্পর্কে তথ্য শীঘ্রই আসছে।";
        });
    </script>
</body>
</html>
