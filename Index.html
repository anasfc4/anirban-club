<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anirban Club | অনির্বাণ ক্লাব</title>
    
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co.com/B5mdnXJK/1000019867.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #28a745; 
            --accent: #ffc107; 
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: url('https://i.ibb.co.com/ns5BsVxp/IMG-20251229-WA0003-1.jpg') no-repeat center center fixed; 
            background-size: cover; 
            image-rendering: -webkit-optimize-contrast; 
            color: #fff;
        }

        .main-wrapper { background: rgba(0, 0, 0, 0.35); min-height: 100vh; width: 100%; }

        .header { 
            padding: 40px 10px; background: rgba(0, 0, 0, 0.7);
            border-bottom: 4px solid var(--primary); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .main-logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); }
        .header h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; letter-spacing: 3px; }

        .menu-bar { 
            display: flex; justify-content: center; gap: 8px; padding: 15px; 
            background: rgba(0,0,0,0.85); position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { 
            background: none; border: 2px solid var(--primary); color: #fff; 
            padding: 10px 15px; border-radius: 30px; cursor: pointer; 
            font-weight: bold; flex: 1; max-width: 120px; font-size: 13px; transition: 0.3s;
        }
        .menu-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }

        /* প্লেয়ার কার্ড ডিজাইন - নাম্বার ট্যাগ নিচে */
        .player-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; padding: 40px 15px; }
        
        .card { 
            background: #fff; width: 280px; height: 440px; 
            border-radius: 20px; position: relative; overflow: hidden; 
            color: #111; text-align: left; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: 0.4s ease;
        }
        .card:hover { transform: translateY(-15px); }

        /* প্লেয়ার ইমেজ */
        .card img.player-photo { 
            width: 100%; height: 75%; object-fit: cover; 
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* কার্ডের তথ্য */
        .p-body { padding: 0 20px; position: absolute; bottom: 85px; width: 100%; }
        .p-body h2 { font-size: 28px; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1; color: #000; }
        .p-body p { color: var(--primary); font-weight: bold; margin: 5px 0; font-size: 14px; text-transform: uppercase; }

        /* কার্ড ফুটার - যেখানে নাম্বার ট্যাগ থাকবে */
        .card-footer { 
            position: absolute; bottom: 0; width: 100%; height: 75px; 
            background: #fff; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; box-sizing: border-box; border-top: 1px solid #eee; 
        }
        .footer-logo { display: flex; align-items: center; gap: 8px; }
        .footer-logo img { width: 35px; height: 35px; border-radius: 50%; }
        .club-tag { font-size: 11px; font-weight: 900; color: #555; line-height: 1.1; }

        /* নাম্বার বক্স - ডানে নিচে */
        .p-number-box { 
            width: 50px; height: 50px; background: #000; color: #fff; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .section { display: none; min-height: 500px; padding: 20px 0; }
        .section.active { display: block; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .card { width: 46%; height: 320px; border-radius: 15px; }
            .p-body { bottom: 65px; padding: 0 10px; }
            .p-body h2 { font-size: 18px; }
            .card-footer { height: 60px; padding: 0 10px; }
            .footer-logo img { width: 25px; height: 25px; }
            .club-tag { font-size: 8px; }
            .p-number-box { width: 35px; height: 35px; font-size: 16px; border-radius: 8px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <img src="https://i.ibb.co.com/B5mdnXJK/1000019867.jpg" class="main-logo" alt="Logo">
        <h1>ANIRBAN CLUB</h1>
    </div>

    <div class="menu-bar">
        <button class="menu-btn active" onclick="showTab('match-sec', this)">MATCHES</button>
        <button class="menu-btn" onclick="showTab('squad-sec', this)">SQUAD</button>
        <button class="menu-btn" onclick="showTab('gallery-sec', this)">GALLERY</button>
        <button class="menu-btn" onclick="showTab('info-sec', this)">ABOUT</button>
    </div>

    <div id="match-sec" class="section active"><div id="match-list"></div></div>
    
    <div id="squad-sec" class="section">
        <div id="player-list" class="player-grid"></div>
    </div>

    <div id="gallery-sec" class="section"><div id="gallery-list" class="player-grid"></div></div>
    
    <div id="info-sec" class="section">
        <div style="max-width:800px; margin:auto; background:rgba(0,0,0,0.8); padding:40px; border-radius:20px; border:1px solid var(--primary);">
            <p id="club-desc" style="line-height:1.8; color:#eee;"></p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC_qcXBjhL5f4LQ7WVeSWHePpEzgEQpHPQ",
        authDomain: "anirban-club-8277f.firebaseapp.com",
        databaseURL: "https://anirban-club-8277f-default-rtdb.firebaseio.com",
        projectId: "anirban-club-8277f",
        storageBucket: "anirban-club-8277f.firebasestorage.app",
        appId: "1:844771629661:web:84b955dd93724060b4cbb4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    db.ref('players').on('value', s => {
        const div = document.getElementById('player-list'); div.innerHTML = '';
        s.forEach(c => {
            const p = c.val();
            div.innerHTML += `
            <div class="card">
                <img src="${p.photo}" class="player-photo" loading="lazy">
                <div class="p-body">
                    <h2>${p.name}</h2>
                    <p>${p.position}</p>
                </div>
                <div class="card-footer">
                    <div class="footer-logo">
                        <img src="https://i.ibb.co.com/B5mdnXJK/1000019867.jpg">
                        <div class="club-tag">ANIRBAN<br>FOOTBALL CLUB</div>
                    </div>
                    <div class="p-number-box">${p.number}</div>
                </div>
            </div>`;
        });
    });

    db.ref('clubInfo').on('value', s => { document.getElementById('club-desc').innerText = s.val(); });
</script>

</body>
</html>
